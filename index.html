<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Question Solver | Ultimate Multi-Cloud</title>
    <!-- Use docx and FileSaver libraries for generating Word Documents directly in browser -->
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background-color: #F8FAFC;
        }

        input[type="text"]:focus, input[type="password"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        select {
            cursor: pointer;
        }

        optgroup {
            font-weight: bold;
            color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-success {
            background-color: var(--success);
            margin-top: 1rem;
            display: none;
        }

        .btn-success:hover {
            background-color: #059669;
        }

        .progress-wrapper {
            margin-top: 2rem;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .progress-bar-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .results-container {
            margin-top: 2rem;
            display: none;
            border-top: 2px solid var(--border);
            padding-top: 2rem;
        }

        .answer-block {
            background: #F1F5F9;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
            white-space: pre-wrap;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg { color: var(--error); font-weight: 600; margin-top: 1rem; text-align: center; }
        .cooldown-msg { color: var(--warning); font-weight: 600; }
        .provider-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--border);
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Answer Generator</h1>
        <p class="subtitle">Google, Groq & OpenRouter (Free) Integration</p>
    </header>

    <div class="grid-3">
        <div class="form-group">
            <label for="apiKey">API Key <span id="keyHint" class="provider-badge">Google API Key</span></label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." required>
        </div>
        <div class="form-group">
            <label for="modelSelect">Select AI Model</label>
            <select id="modelSelect" onchange="updateUI()">
                <!-- GOOGLE GEMINI (ALL VERSIONS) -->
                <optgroup label="Google AI Studio (Gemini)">
                    <option value="gemini-3.1-pro-preview" data-provider="google">Gemini 3.1 Pro Preview</option>
                    <option value="gemini-3-pro-preview" data-provider="google">Gemini 3 Pro Preview</option>
                    <option value="gemini-3-flash-preview" data-provider="google">Gemini 3 Flash Preview</option>
                    <option value="gemini-2.5-pro" data-provider="google">Gemini 2.5 Pro</option>
                    <option value="gemini-2.5-flash-lite-preview-06-17" data-provider="google">Gemini 2.5 Flash Lite Preview</option>
                    <option value="gemini-2.5-flash" data-provider="google">Gemini 2.5 Flash</option>
                    <option value="gemini-2.0-pro-exp-02-05" data-provider="google">Gemini 2.0 Pro Experimental</option>
                    <option value="gemini-2.0-flash-001" data-provider="google">Gemini 2.0 Flash (001)</option>
                    <option value="gemini-2.0-flash-lite-preview-02-05" data-provider="google">Gemini 2.0 Flash Lite Preview</option>
                    <option value="gemini-flash-latest" data-provider="google">Gemini Flash Latest</option>
                    <option value="gemini-1.5-pro-latest" data-provider="google">Gemini 1.5 Pro Latest</option>
                    <option value="gemini-1.5-flash-latest" data-provider="google">Gemini 1.5 Flash Latest</option>
                    <option value="gemini-1.5-pro" data-provider="google">Gemini 1.5 Pro</option>
                    <option value="gemini-1.5-flash" data-provider="google">Gemini 1.5 Flash</option>
                    <option value="gemini-1.0-pro-latest" data-provider="google">Gemini 1.0 Pro Latest</option>
                </optgroup>
                
                <!-- GROQ CLOUD -->
                <optgroup label="Groq Cloud">
                    <option value="llama-3.1-8b-instant" data-provider="groq">Llama 3.1 8B (Fast)</option>
                    <option value="llama3-70b-8192" data-provider="groq">Llama 3 70B (High Quality)</option>
                    <option value="mixtral-8x7b-32768" data-provider="groq">Mixtral 8x7B</option>
                    <option value="gemma2-9b-it" data-provider="groq">Gemma 2 9B (Groq)</option>
                </optgroup>

                <!-- OPENROUTER (FREE MODELS) -->
                <optgroup label="OpenRouter (Free)">
                    <option value="google/gemini-2.0-flash-lite-preview-02-05:free" data-provider="openrouter">Gemini 2.0 Flash Lite (Free)</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free" data-provider="openrouter">Llama 3.1 8B Instruct (Free)</option>
                    <option value="qwen/qwen-2-7b-instruct:free" data-provider="openrouter">Qwen 2 7B (Free)</option>
                    <option value="mistralai/mistral-nemo:free" data-provider="openrouter">Mistral Nemo (Free)</option>
                    <option value="cognitivecomputations/dolphin-mixtral-8x7b:free" data-provider="openrouter">Dolphin Mixtral (Free)</option>
                </optgroup>
            </select>
        </div>
        <div class="form-group">
            <label for="subject">Subject Name</label>
            <input type="text" id="subject" placeholder="e.g., Microbiology" required>
        </div>
    </div>

    <div class="form-group">
        <label for="longQs">Long Questions (One per line)</label>
        <textarea id="longQs" placeholder="Paste your long questions here..."></textarea>
    </div>

    <div class="form-group">
        <label for="shortQs">Short Questions (One per line)</label>
        <textarea id="shortQs" placeholder="Paste your short questions here..."></textarea>
    </div>

    <button id="generateBtn" onclick="startProcessing()">
        <span id="btnText">Generate Answers</span>
        <div id="btnSpinner" class="spinner" style="display: none;"></div>
    </button>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-header">
            <span id="progressStatus">Processing batch 1 of X...</span>
            <span id="progressPercentage">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="errorDisplay" class="error-msg"></div>
    </div>

    <div class="results-container" id="resultsContainer">
        <h2>Generated Answers</h2>
        <div id="answersList"></div>
        <button id="downloadBtn" class="btn-success" onclick="downloadWordFile()">Download Word Document (.docx)</button>
    </div>
</div>

<script>
    let completeQnaData = [];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // UI Updates automatically when model is changed
    function updateUI() {
        const select = document.getElementById('modelSelect');
        const provider = select.options[select.selectedIndex].dataset.provider;
        const apiKeyInput = document.getElementById('apiKey');
        const keyHint = document.getElementById('keyHint');

        if (provider === 'google') {
            apiKeyInput.placeholder = 'AIzaSy...';
            keyHint.innerText = 'Google API Key required';
            keyHint.style.color = '#10B981'; // Green
        } else if (provider === 'groq') {
            apiKeyInput.placeholder = 'gsk_...';
            keyHint.innerText = 'Groq API Key required';
            keyHint.style.color = '#F59E0B'; // Orange
        } else if (provider === 'openrouter') {
            apiKeyInput.placeholder = 'sk-or-v1-...';
            keyHint.innerText = 'OpenRouter API Key required';
            keyHint.style.color = '#4F46E5'; // Blue
        }
    }
    
    // Call on load to set initial state
    updateUI();

    async function startProcessing() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const select = document.getElementById('modelSelect');
        const selectedModel = select.value;
        const provider = select.options[select.selectedIndex].dataset.provider;
        const subject = document.getElementById('subject').value.trim();
        const longQsRaw = document.getElementById('longQs').value;
        const shortQsRaw = document.getElementById('shortQs').value;
        
        const generateBtn = document.getElementById('generateBtn');
        const errorDisplay = document.getElementById('errorDisplay');
        
        if (!apiKey || !subject) {
            alert('Please enter your API Key and Subject Name.');
            return;
        }

        const parseQuestions = (text) => text.split('\n').map(q => q.trim()).filter(q => q.length > 0);
        const longQs = parseQuestions(longQsRaw);
        const shortQs = parseQuestions(shortQsRaw);
        const allQuestions = [...longQs, ...shortQs];

        if (allQuestions.length === 0) {
            alert('Please provide at least one question.');
            return;
        }

        const batchSize = 4;
        const batches = [];
        for (let i = 0; i < allQuestions.length; i += batchSize) {
            batches.push(allQuestions.slice(i, i + batchSize));
        }

        generateBtn.disabled = true;
        document.getElementById('btnText').innerText = 'Processing...';
        document.getElementById('btnSpinner').style.display = 'block';
        
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const progressStatus = document.getElementById('progressStatus');
        const progressPercentage = document.getElementById('progressPercentage');
        const resultsContainer = document.getElementById('resultsContainer');
        const answersList = document.getElementById('answersList');
        
        progressWrapper.style.display = 'block';
        resultsContainer.style.display = 'block';
        errorDisplay.innerText = '';
        answersList.innerHTML = '';
        completeQnaData = []; 

        for (let i = 0; i < batches.length; i++) {
            const currentBatch = batches[i];
            
            progressStatus.innerText = `Processing batch ${i + 1} of ${batches.length}...`;
            progressStatus.classList.remove('cooldown-msg');
            const percentage = Math.round(((i) / batches.length) * 100);
            progressBar.style.width = `${percentage}%`;
            progressPercentage.innerText = `${percentage}%`;

            const prompt = `Answer the following questions clearly and in detail. 
Subject: ${subject}
Questions:
${currentBatch.map((q, idx) => `${idx + 1}. ${q}`).join('\n')}

Format your output neatly. Provide the question first, then the answer below it.`;

            try {
                let aiAnswer = "";

                // --- SMART API ROUTER ---
                if (provider === 'google') {
                    // Google AI Studio Fetch
                    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;
                    const response = await fetch(geminiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.5 }
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || 'Google API request failed');
                    }
                    const data = await response.json();
                    aiAnswer = data.candidates[0].content.parts[0].text;

                } else if (provider === 'groq' || provider === 'openrouter') {
                    // Groq & OpenRouter use the exact same OpenAI-compatible structure
                    const url = provider === 'groq' 
                        ? 'https://api.groq.com/openai/v1/chat/completions'
                        : 'https://openrouter.ai/api/v1/chat/completions';
                    
                    const headers = {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    };
                    
                    // OpenRouter specific headers for app identification
                    if (provider === 'openrouter') {
                        headers['HTTP-Referer'] = window.location.href;
                        headers['X-Title'] = 'AI Answer Generator';
                    }

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            model: selectedModel, 
                            messages: [{ role: 'user', content: prompt }],
                            temperature: 0.5
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `${provider} API request failed`);
                    }
                    const data = await response.json();
                    aiAnswer = data.choices[0].message.content;
                }

                // Save and Display Data
                completeQnaData.push(aiAnswer);
                const answerDiv = document.createElement('div');
                answerDiv.className = 'answer-block';
                answerDiv.innerText = aiAnswer;
                answersList.appendChild(answerDiv);

                // Anti Rate-Limit Delay (Cool-down)
                if (i < batches.length - 1) {
                    progressStatus.innerText = `Cooling down for 6s to prevent Rate Limit (${provider})...`;
                    progressStatus.classList.add('cooldown-msg');
                    await sleep(6000); 
                }

            } catch (error) {
                console.error("Error processing batch:", error);
                errorDisplay.innerText = `Error on batch ${i + 1}: ${error.message}. Process halted.`;
                break; 
            }
        }

        if (errorDisplay.innerText === '') {
            progressBar.style.width = '100%';
            progressPercentage.innerText = '100%';
            progressStatus.innerText = 'All processing complete!';
            progressStatus.classList.remove('cooldown-msg');
            document.getElementById('downloadBtn').style.display = 'block';
        }

        generateBtn.disabled = false;
        document.getElementById('btnText').innerText = 'Generate Answers';
        document.getElementById('btnSpinner').style.display = 'none';
    }

    // --- WORD DOCUMENT GENERATOR ---
    async function downloadWordFile() {
        if (completeQnaData.length === 0) return;
        const subject = document.getElementById('subject').value.trim() || 'Subject';
        const { Document, Packer, Paragraph, TextRun, Header, Footer, PageNumber, AlignmentType } = docx;
        const docChildren = [];

        completeQnaData.forEach(batchText => {
            const lines = batchText.split('\n');
            lines.forEach(line => {
                docChildren.push(
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: line,
                                size: 40, // 20pt (Half-points format)
                            })
                        ],
                        spacing: { after: 200 }
                    })
                );
            });
            docChildren.push(new Paragraph({ text: " ", spacing: { after: 400 } }));
        });

        const doc = new Document({
            sections: [{
                // Strictly ZERO Margins
                properties: { page: { margin: { top: 0, right: 0, bottom: 0, left: 0 } } },
                headers: {
                    default: new Header({
                        children: [
                            new Paragraph({
                                children: [new TextRun({ text: subject, bold: true, size: 40 })],
                                alignment: AlignmentType.CENTER,
                            })
                        ]
                    })
                },
                footers: {
                    default: new Footer({
                        children: [
                            new Paragraph({
                                children: [new TextRun({ children: ["Page ", PageNumber.CURRENT], size: 40 })],
                                alignment: AlignmentType.CENTER,
                            })
                        ]
                    })
                },
                children: docChildren
            }]
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `${subject}_Answers.docx`);
        }).catch(err => {
            console.error("Error generating docx:", err);
            alert("Error generating the Word file.");
        });
    }
</script>

</body>
</html>
