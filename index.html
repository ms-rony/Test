<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Answer Solver | Premium Edition</title>
    
    <!-- Modern Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Stable Docx Library -->
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    
    <!-- FileSaver.js - Robust cross-browser/mobile file saving -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4338CA;
            --primary-hover: #3730A3;
            --secondary: #0F172A;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.025);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-section h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: -0.02em;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        #resultsView { display: none; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--bg);
            color: var(--primary);
            font-weight: 700;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background-color: var(--bg);
            color: var(--text-main);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            margin-top: 1rem;
        }

        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background-color: var(--text-muted); cursor: not-allowed; opacity: 0.8; }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--secondary);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:active { transform: scale(0.98); background-color: #047857; }

        .progress-container {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--secondary);
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background-color: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .preview-box {
            background: #F1F5F9;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .answer-block {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed #CBD5E1;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .answer-block:last-child { border-bottom: none; }

        .export-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            background: #F8FAFC;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* In-app browser warning banner */
        .inapp-warning {
            display: none;
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            border: 1px solid #F59E0B;
            border-radius: var(--radius-md);
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #92400E;
            line-height: 1.5;
        }
        .inapp-warning i {
            color: #D97706;
            margin-right: 6px;
        }
        .inapp-warning a {
            color: #92400E;
            font-weight: 700;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container { padding: 1.5rem; }
            .results-header { flex-direction: column; gap: 1rem; align-items: stretch; }
            .results-header h2 { font-size: 1.5rem; text-align: center; }
            .btn-outline { width: 100%; }
            body { padding: 0; }
            .container { border-radius: 0; min-height: 100vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>AI Answer Generator</h1>
        <p>Premium Content & Document Formatter</p>
    </div>

    <!-- FORM VIEW -->
    <div id="formView">
        <div class="form-grid">
            <div class="form-group">
                <label>API Key <span id="keyBadge" class="badge">Google</span></label>
                <input type="password" id="apiKey" placeholder="Enter API Key..." required>
            </div>
            <div class="form-group">
                <label>Select AI Model</label>
                <select id="modelSelect" onchange="updateUI()">
                    <optgroup label="Google AI Studio (Gemini)">
                        <option value="gemini-2.5-flash" data-provider="google">Gemini 2.5 Flash ⭐</option>
                        <option value="gemini-2.5-pro" data-provider="google">Gemini 2.5 Pro 🧠</option>
                    </optgroup>
                    <optgroup label="Groq Cloud">
                        <option value="llama-3.3-70b-versatile" data-provider="groq">Llama 3.3 70B Versatile</option>
                    </optgroup>
                    <optgroup label="OpenRouter (Free)">
                        <option value="google/gemini-2.0-flash-exp:free" data-provider="openrouter">Gemini 2.0 Flash Exp</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="subject" placeholder="e.g., Advanced Computing" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label>Long Questions <span style="font-weight: normal; color: var(--text-muted);">(Detailed answers)</span></label>
            <textarea id="longQs" placeholder="Paste long questions here... (One per line)"></textarea>
        </div>

        <div class="form-group">
            <label>Short Questions <span style="font-weight: normal; color: var(--text-muted);">(Concise answers)</span></label>
            <textarea id="shortQs" placeholder="Paste short questions here... (One per line)"></textarea>
        </div>

        <button id="generateBtn" class="btn btn-primary" onclick="startProcessing()">
            <i class="fas fa-magic"></i> <span id="btnText">Generate Premium Answers</span>
            <div id="btnSpinner" class="spinner" style="display: none;"></div>
        </button>

        <div class="progress-container" id="progressWrapper">
            <div class="progress-header">
                <span id="progressStatus">Initializing...</span>
                <span id="progressPercentage">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <p id="errorDisplay" style="color: var(--danger); font-size: 0.9rem; margin-top: 1rem; display: none; font-weight: bold; text-align: center;"></p>
        </div>
    </div>

    <!-- RESULTS VIEW -->
    <div id="resultsView">
        <div class="results-header">
            <h2><i class="fas fa-check-circle" style="color: var(--success);"></i> Generation Complete</h2>
            <button class="btn btn-outline" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Edit Questions
            </button>
        </div>

        <!-- In-app browser warning -->
        <div class="inapp-warning" id="inappWarning">
            <i class="fas fa-exclamation-triangle"></i>
            <strong>In-App Browser Detected!</strong><br>
            Yahan se download nahi hoga. Page ko apne real browser (Chrome/Safari) mein kholein:
            <br>Upar ⋮ ya <i class="fas fa-ellipsis-h"></i> icon dabayein → <strong>"Open in Browser"</strong> select karein.
        </div>

        <label style="margin-bottom: 0.5rem; display: block;">Word File Settings</label>
        <div class="export-controls">
            <div class="form-group">
                <label>Font Family</label>
                <select id="docFont">
                    <option value="Arial">Arial</option>
                    <option value="Calibri" selected>Calibri</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>
            <div class="form-group">
                <label>Font Size</label>
                <select id="docSize">
                    <option value="10">10 pt</option>
                    <option value="12" selected>12 pt (Standard)</option>
                    <option value="14">14 pt</option>
                    <option value="16">16 pt</option>
                    <option value="18">18 pt</option>
                    <option value="20">20 pt</option>
                    <option value="22">22 pt (Max)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Text Alignment</label>
                <select id="docAlign">
                    <option value="left">Left Align</option>
                    <option value="both" selected>Justified</option>
                </select>
            </div>
        </div>

        <button id="downloadBtn" class="btn btn-success" onclick="downloadWordFile()" style="margin-bottom: 2rem;">
            <i class="fas fa-download"></i> <span id="downloadText">Download Word Document</span>
        </button>

        <label style="margin-bottom: 0.5rem; display: block;">Content Preview</label>
        <div class="preview-box" id="answersList"></div>
    </div>
</div>

<script>
    let completeQnaData = [];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // --- Detect in-app browsers ---
    function isInAppBrowser() {
        const ua = navigator.userAgent || navigator.vendor || '';
        // Instagram, Facebook, Snapchat, Twitter, LinkedIn, TikTok, Line, WeChat, etc.
        const inAppPatterns = [
            'FBAN', 'FBAV',        // Facebook
            'Instagram',            // Instagram
            'Snapchat',             // Snapchat
            'Twitter',              // Twitter/X
            'LinkedInApp',          // LinkedIn
            'BytedanceWebview',     // TikTok
            'musical_ly',           // TikTok alt
            'Line/',                // Line
            'MicroMessenger',       // WeChat
            'WhatsApp',             // WhatsApp (rarely opens pages)
            'Telegram'              // Telegram
        ];
        return inAppPatterns.some(p => ua.indexOf(p) > -1);
    }

    function updateUI() {
        const select = document.getElementById('modelSelect');
        const provider = select.options[select.selectedIndex].dataset.provider;
        const badge = document.getElementById('keyBadge');
        const colors = {
            'google': { text: 'Google API', color: '#10B981' },
            'groq': { text: 'Groq API', color: '#F59E0B' },
            'openrouter': { text: 'OpenRouter', color: '#4F46E5' }
        };
        badge.innerText = colors[provider]?.text || 'API Key';
        badge.style.color = colors[provider]?.color || '#4338CA';
    }
    updateUI();

    function goBack() {
        document.getElementById('resultsView').style.display = 'none';
        document.getElementById('formView').style.display = 'block';
    }

    async function startProcessing() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const select = document.getElementById('modelSelect');
        const selectedModel = select.value;
        const provider = select.options[select.selectedIndex].dataset.provider;
        const subject = document.getElementById('subject').value.trim();
        
        const longQs = document.getElementById('longQs').value.split('\n').map(q => q.trim()).filter(q => q.length > 0);
        const shortQs = document.getElementById('shortQs').value.split('\n').map(q => q.trim()).filter(q => q.length > 0);
        
        if (!apiKey || !subject) return alert('Bhai, API Key aur Subject Name zaroori hai.');
        if (longQs.length === 0 && shortQs.length === 0) return alert('Kam az kam ek question dalo start karne ke liye.');

        document.getElementById('generateBtn').disabled = true;
        document.getElementById('btnText').style.display = 'none';
        document.getElementById('btnSpinner').style.display = 'block';
        document.getElementById('progressWrapper').style.display = 'block';
        document.getElementById('errorDisplay').style.display = 'none';
        
        document.getElementById('answersList').innerHTML = '';
        completeQnaData = [];

        const allTasks = [];
        longQs.forEach(q => allTasks.push({ type: 'long', text: q }));
        shortQs.forEach(q => allTasks.push({ type: 'short', text: q }));

        const batchSize = 3; 
        const batches = [];
        for (let i = 0; i < allTasks.length; i += batchSize) {
            batches.push(allTasks.slice(i, i + batchSize));
        }

        for (let i = 0; i < batches.length; i++) {
            const batch = batches[i];
            updateProgress(`Processing batch ${i + 1} of ${batches.length}...`, Math.round((i / batches.length) * 100));

            const prompt = `You are an expert professor in ${subject}. Answer the following questions.
CRITICAL RULES:
- LONG questions: Provide detailed, multi-level comprehensive answers. Use Main Headings, Sub-headings, Bullet points, and detailed paragraphs.
- SHORT questions: Provide concise, direct answers (3-5 sentences maximum).
- Always rewrite the question clearly before answering.

Questions to answer:
${batch.map((q, idx) => `[${q.type.toUpperCase()} QUESTION] ${idx + 1}. ${q.text}`).join('\n')}`;

            try {
                let aiAnswer = await fetchAIResponse(provider, selectedModel, apiKey, prompt);
                completeQnaData.push(aiAnswer);
                
                const div = document.createElement('div');
                div.className = 'answer-block';
                div.innerText = aiAnswer;
                document.getElementById('answersList').appendChild(div);

                if (i < batches.length - 1) {
                    updateProgress(`Cooling down...`, Math.round(((i+0.5) / batches.length) * 100));
                    await sleep(4000);
                }
            } catch (err) {
                document.getElementById('errorDisplay').innerText = `Error: ${err.message}`;
                document.getElementById('errorDisplay').style.display = 'block';
                break;
            }
        }

        updateProgress('Generation Complete!', 100);
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('btnText').style.display = 'inline';
        document.getElementById('btnSpinner').style.display = 'none';
        document.getElementById('progressWrapper').style.display = 'none';
        
        if (completeQnaData.length > 0 && document.getElementById('errorDisplay').style.display === 'none') {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('resultsView').style.display = 'block';
            window.scrollTo(0, 0);

            // Show in-app browser warning if needed
            if (isInAppBrowser()) {
                document.getElementById('inappWarning').style.display = 'block';
            }
        }
    }

    function updateProgress(text, percent) {
        document.getElementById('progressStatus').innerText = text;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressPercentage').innerText = `${percent}%`;
    }

    async function fetchAIResponse(provider, model, key, prompt) {
        if (provider === 'google') {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!res.ok) throw new Error('API Error - Check Key limit');
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        } else {
            const url = provider === 'groq' ? 'https://api.groq.com/openai/v1/chat/completions' : 'https://openrouter.ai/api/v1/chat/completions';
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: model, messages: [{ role: 'user', content: prompt }] })
            });
            if (!res.ok) throw new Error(`${provider} API Error`);
            const data = await res.json();
            return data.choices[0].message.content;
        }
    }

    // =====================================================
    // BULLETPROOF MOBILE DOWNLOAD SYSTEM (5 Methods)
    // =====================================================
    function triggerDownload(blob, filename) {
        const mimeType = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';

        // Ensure correct MIME type on blob
        const properBlob = new Blob([blob], { type: mimeType });

        // --- Method 1: FileSaver.js (most reliable cross-platform) ---
        if (typeof saveAs !== 'undefined') {
            try {
                saveAs(properBlob, filename);
                console.log('[Download] FileSaver.js method used');
                return;
            } catch(e) {
                console.warn('[Download] FileSaver.js failed:', e);
            }
        }

        // --- Method 2: Navigator share API (mobile native share sheet) ---
        if (navigator.canShare && navigator.canShare({ files: [new File([properBlob], filename, { type: mimeType })] })) {
            try {
                const file = new File([properBlob], filename, { type: mimeType });
                navigator.share({
                    files: [file],
                    title: filename,
                    text: 'Your generated document'
                }).then(() => {
                    console.log('[Download] Web Share API method used');
                }).catch((e) => {
                    console.warn('[Download] Web Share failed, falling back:', e);
                    fallbackDownload(properBlob, filename);
                });
                return;
            } catch(e) {
                console.warn('[Download] Web Share API setup failed:', e);
            }
        }

        // --- Method 3: Standard anchor click ---
        fallbackDownload(properBlob, filename);
    }

    function fallbackDownload(blob, filename) {
        // Method 3: Standard <a> download
        try {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.style.display = 'none';
            document.body.appendChild(a);
            
            // Use both click methods for maximum compatibility
            if (a.click) {
                a.click();
            } else {
                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true
                });
                a.dispatchEvent(clickEvent);
            }

            console.log('[Download] Anchor click method used');
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 5000);
            return;
        } catch(e) {
            console.warn('[Download] Anchor method failed:', e);
        }

        // Method 4: window.open with blob URL
        try {
            const url = URL.createObjectURL(blob);
            const newWin = window.open(url, '_blank');
            if (!newWin) {
                // Popup blocked, try location
                window.location.href = url;
            }
            console.log('[Download] window.open method used');
            setTimeout(() => URL.revokeObjectURL(url), 10000);
            return;
        } catch(e) {
            console.warn('[Download] window.open failed:', e);
        }

        // Method 5: Base64 data URI (last resort)
        try {
            const reader = new FileReader();
            reader.onloadend = function() {
                const a = document.createElement('a');
                a.href = reader.result;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                console.log('[Download] Base64 fallback method used');
            };
            reader.readAsDataURL(blob);
        } catch(e) {
            console.error('[Download] All methods failed:', e);
            alert('Download nahi ho raha. Please apne phone ka Chrome/Safari browser use karein (Instagram/Facebook ke andar se nahi hoga).');
        }
    }

    async function downloadWordFile() {
        if (completeQnaData.length === 0) return;
        
        const downloadBtn = document.getElementById('downloadBtn');
        const originalText = document.getElementById('downloadText').innerText;
        document.getElementById('downloadText').innerText = "Processing File...";
        downloadBtn.disabled = true;

        try {
            const subject = document.getElementById('subject').value || 'Generated_Answers';
            const fontFamily = document.getElementById('docFont').value;
            const fontSizeVal = parseInt(document.getElementById('docSize').value) * 2; 
            const alignVal = document.getElementById('docAlign').value;
            
            const AlignmentType = docx.AlignmentType;
            const HeadingLevel = docx.HeadingLevel;
            const alignObj = alignVal === 'left' ? AlignmentType.LEFT : AlignmentType.JUSTIFIED;
            const docChildren = [];

            docChildren.push(new docx.Paragraph({
                text: `${subject} - Comprehensive Answers`,
                heading: HeadingLevel.HEADING_1,
                alignment: AlignmentType.CENTER,
                spacing: { after: 400 }
            }));

            completeQnaData.forEach((textBlock, index) => {
                const lines = textBlock.split('\n');
                
                lines.forEach(line => {
                    const cleanLine = line.replace(/\r/g, '').trim();
                    if (cleanLine === '') {
                        docChildren.push(new docx.Paragraph({ text: "", spacing: { after: 200 } }));
                        return;
                    }

                    let isBold = false;
                    let textContent = cleanLine;

                    if (textContent.includes('**')) {
                        isBold = true;
                        textContent = textContent.replace(/\*\*/g, '');
                    }
                    if (textContent.startsWith('#')) {
                        isBold = true;
                        textContent = textContent.replace(/#/g, '').trim();
                    }

                    docChildren.push(new docx.Paragraph({
                        children: [
                            new docx.TextRun({
                                text: textContent,
                                font: fontFamily,
                                size: fontSizeVal,
                                bold: isBold
                            })
                        ],
                        alignment: alignObj,
                        spacing: { after: 120, line: 360 } 
                    }));
                });
                
                if(index < completeQnaData.length - 1) {
                    docChildren.push(new docx.Paragraph({
                        text: "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
                        alignment: AlignmentType.CENTER,
                        spacing: { before: 400, after: 400 }
                    }));
                }
            });

            const doc = new docx.Document({
                creator: "AI Solver",
                title: subject,
                sections: [{
                    properties: { page: { margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } },
                    children: docChildren
                }]
            });

            // Generate blob and trigger robust download
            const blob = await docx.Packer.toBlob(doc);
            const safeFilename = `${subject.replace(/[^a-z0-9]/gi, '_')}.docx`;
            
            triggerDownload(blob, safeFilename);
            document.getElementById('downloadText').innerText = "Downloaded! ✓";
            
        } catch (err) {
            console.error("Docx Error:", err);
            alert("Download Fail: " + err.message);
        } finally {
            setTimeout(() => {
                document.getElementById('downloadText').innerText = originalText;
                downloadBtn.disabled = false;
            }, 3000);
        }
    }
</script>
</body>
</html>
