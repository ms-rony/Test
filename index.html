<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Answer Solver | Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4338CA;
            --primary-hover: #3730A3;
            --secondary: #0F172A;
            --bg: #F1F5F9;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.025);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--surface);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: -0.02em;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        /* Views */
        #resultsView { display: none; }

        /* Form Elements */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--bg);
            color: var(--primary);
            font-weight: 700;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background-color: var(--bg);
            color: var(--text-main);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 140px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--secondary);
        }

        .btn-outline:hover {
            background-color: var(--bg);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: #047857;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background-color: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.4s ease;
        }

        /* Results View */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .preview-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .preview-box::-webkit-scrollbar {
            width: 6px;
        }
        .preview-box::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .answer-block {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed var(--border);
            white-space: pre-wrap;
        }
        .answer-block:last-child { border-bottom: none; }

        /* Word Export Controls */
        .export-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            background: #F8FAFC;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        /* Animations */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .container { padding: 1.5rem; }
            .form-grid, .export-controls { grid-template-columns: 1fr; }
            .results-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>AI Answer Generator</h1>
        <p>Premium Content Generation & Document Formatting</p>
    </div>

    <div id="formView">
        <div class="form-grid">
            <div class="form-group">
                <label>API Key <span id="keyBadge" class="badge">Google</span></label>
                <input type="password" id="apiKey" placeholder="Enter API Key..." required>
            </div>
            <div class="form-group">
                <label>Select AI Model</label>
                <select id="modelSelect" onchange="updateUI()">
                    <optgroup label="Google AI Studio (Gemini)">
                        <option value="gemini-2.5-flash" data-provider="google">Gemini 2.5 Flash ⭐</option>
                        <option value="gemini-2.5-pro" data-provider="google">Gemini 2.5 Pro 🧠</option>
                    </optgroup>
                    <optgroup label="Groq Cloud">
                        <option value="llama-3.3-70b-versatile" data-provider="groq">Llama 3.3 70B Versatile</option>
                    </optgroup>
                    <optgroup label="OpenRouter (Free)">
                        <option value="google/gemini-2.0-flash-exp:free" data-provider="openrouter">Gemini 2.0 Flash Exp</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="subject" placeholder="e.g., Advanced Computing" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label>Long Questions <span style="font-weight: normal; color: var(--text-muted);">(Multi-level detailed answers)</span></label>
            <textarea id="longQs" placeholder="Paste long questions here... (One per line)"></textarea>
        </div>

        <div class="form-group">
            <label>Short Questions <span style="font-weight: normal; color: var(--text-muted);">(Concise answers)</span></label>
            <textarea id="shortQs" placeholder="Paste short questions here... (One per line)"></textarea>
        </div>

        <button id="generateBtn" class="btn btn-primary" onclick="startProcessing()">
            <i class="fas fa-magic"></i> <span id="btnText">Generate Premium Answers</span>
            <div id="btnSpinner" class="spinner" style="display: none;"></div>
        </button>

        <div class="progress-container" id="progressWrapper">
            <div class="progress-header">
                <span id="progressStatus">Initializing...</span>
                <span id="progressPercentage">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <p id="errorDisplay" style="color: var(--danger); font-size: 0.9rem; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <div id="resultsView">
        <div class="results-header">
            <h2><i class="fas fa-check-circle" style="color: var(--success);"></i> Generation Complete</h2>
            <button class="btn btn-outline" style="width: auto; padding: 0.5rem 1rem;" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back to Editor
            </button>
        </div>

        <label style="margin-bottom: 0.5rem;">Document Export Controls</label>
        <div class="export-controls">
            <div class="form-group">
                <label>Font Family</label>
                <select id="docFont">
                    <option value="Arial">Arial</option>
                    <option value="Calibri">Calibri</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>
            <div class="form-group">
                <label>Font Size</label>
                <select id="docSize">
                    <option value="20">10 pt</option>
                    <option value="24" selected>12 pt (Standard)</option>
                    <option value="28">14 pt</option>
                    <option value="32">16 pt</option>
                </select>
            </div>
            <div class="form-group">
                <label>Alignment</label>
                <select id="docAlign">
                    <option value="left">Left</option>
                    <option value="both" selected>Justify</option>
                </select>
            </div>
        </div>

        <button class="btn btn-success" onclick="downloadWordFile()" style="margin-bottom: 2rem;">
            <i class="fas fa-file-word"></i> Download Word Document
        </button>

        <label style="margin-bottom: 0.5rem;">Content Preview</label>
        <div class="preview-box" id="answersList">
            </div>
    </div>
</div>

<script>
    let completeQnaData = [];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function updateUI() {
        const select = document.getElementById('modelSelect');
        const provider = select.options[select.selectedIndex].dataset.provider;
        const badge = document.getElementById('keyBadge');
        
        const colors = {
            'google': { text: 'Google API', color: '#10B981' },
            'groq': { text: 'Groq API', color: '#F59E0B' },
            'openrouter': { text: 'OpenRouter', color: '#4F46E5' }
        };

        badge.innerText = colors[provider]?.text || 'API Key';
        badge.style.color = colors[provider]?.color || '#4338CA';
    }
    updateUI();

    function goBack() {
        document.getElementById('resultsView').style.display = 'none';
        document.getElementById('formView').style.display = 'block';
    }

    async function startProcessing() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const select = document.getElementById('modelSelect');
        const selectedModel = select.value;
        const provider = select.options[select.selectedIndex].dataset.provider;
        const subject = document.getElementById('subject').value.trim();
        
        const longQs = document.getElementById('longQs').value.split('\n').map(q => q.trim()).filter(q => q.length > 0);
        const shortQs = document.getElementById('shortQs').value.split('\n').map(q => q.trim()).filter(q => q.length > 0);
        
        if (!apiKey || !subject) return alert('API Key aur Subject Name zaroori hai.');
        if (longQs.length === 0 && shortQs.length === 0) return alert('Kam az kam ek question dalo.');

        // Setup UI for processing
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('btnText').style.display = 'none';
        document.getElementById('btnSpinner').style.display = 'block';
        document.getElementById('progressWrapper').style.display = 'block';
        document.getElementById('errorDisplay').style.display = 'none';
        
        document.getElementById('answersList').innerHTML = '';
        completeQnaData = [];

        // Combine questions with context
        const allTasks = [];
        longQs.forEach(q => allTasks.push({ type: 'long', text: q }));
        shortQs.forEach(q => allTasks.push({ type: 'short', text: q }));

        // Batch processing
        const batchSize = 3; 
        const batches = [];
        for (let i = 0; i < allTasks.length; i += batchSize) {
            batches.push(allTasks.slice(i, i + batchSize));
        }

        for (let i = 0; i < batches.length; i++) {
            const batch = batches[i];
            updateProgress(`Processing batch ${i + 1} of ${batches.length}...`, Math.round((i / batches.length) * 100));

            // PROMPT ENGINEERING: Advanced Multi-level Prompting
            const prompt = `You are an expert professor in ${subject}. Answer the following questions.
            CRITICAL FORMATTING RULES:
            - For LONG questions: Provide highly detailed, multi-level comprehensive answers. Use Main Headings, Sub-headings, Bullet points, and detailed paragraphs. Explain concepts deeply.
            - For SHORT questions: Provide concise, clear, and direct answers (3-5 sentences maximum).
            - Always rewrite the question first before answering.
            
            Questions to answer:
            ${batch.map((q, idx) => `[${q.type.toUpperCase()} QUESTION] ${idx + 1}. ${q.text}`).join('\n')}`;

            try {
                let aiAnswer = await fetchAIResponse(provider, selectedModel, apiKey, prompt);
                completeQnaData.push(aiAnswer);
                
                // Add to preview
                const div = document.createElement('div');
                div.className = 'answer-block';
                div.innerText = aiAnswer;
                document.getElementById('answersList').appendChild(div);

                if (i < batches.length - 1) {
                    updateProgress(`Cooling down to prevent rate limits...`, Math.round(((i+0.5) / batches.length) * 100));
                    await sleep(4000);
                }
            } catch (err) {
                document.getElementById('errorDisplay').innerText = `Error: ${err.message}`;
                document.getElementById('errorDisplay').style.display = 'block';
                break;
            }
        }

        // Completion
        updateProgress('Generation Complete!', 100);
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('btnText').style.display = 'inline';
        document.getElementById('btnSpinner').style.display = 'none';
        document.getElementById('progressWrapper').style.display = 'none';
        
        if (completeQnaData.length > 0) {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('resultsView').style.display = 'block';
        }
    }

    function updateProgress(text, percent) {
        document.getElementById('progressStatus').innerText = text;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progressPercentage').innerText = `${percent}%`;
    }

    async function fetchAIResponse(provider, model, key, prompt) {
        if (provider === 'google') {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!res.ok) throw new Error('Google API Failed');
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        } else {
            const url = provider === 'groq' ? 'https://api.groq.com/openai/v1/chat/completions' : 'https://openrouter.ai/api/v1/chat/completions';
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: model, messages: [{ role: 'user', content: prompt }] })
            });
            if (!res.ok) throw new Error(`${provider} API Failed`);
            const data = await res.json();
            return data.choices[0].message.content;
        }
    }

    // ROBUST WORD DOCUMENT GENERATOR (FIXED DOCX EXPORT)
    async function downloadWordFile() {
        if (completeQnaData.length === 0) return;
        
        const subject = document.getElementById('subject').value || 'Generated_Answers';
        const fontFamily = document.getElementById('docFont').value;
        const fontSize = parseInt(document.getElementById('docSize').value); // Half-points
        const alignVal = document.getElementById('docAlign').value;
        
        const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType } = docx;
        
        const alignObj = alignVal === 'left' ? AlignmentType.LEFT : AlignmentType.JUSTIFIED;
        const docChildren = [];

        // Title
        docChildren.push(new Paragraph({
            text: `${subject} - Comprehensive Answers`,
            heading: HeadingLevel.HEADING_1,
            alignment: AlignmentType.CENTER,
            spacing: { after: 400 }
        }));

        completeQnaData.forEach(textBlock => {
            const lines = textBlock.split('\n');
            
            lines.forEach(line => {
                const cleanLine = line.trim();
                if (!cleanLine) return; // Skip empty lines to prevent Word crash

                let isBold = false;
                let textContent = cleanLine;

                // Simple markdown bold parsing for headers generated by AI (e.g., **Heading**)
                if (textContent.startsWith('**') && textContent.endsWith('**')) {
                    isBold = true;
                    textContent = textContent.replace(/\*\*/g, '');
                }

                docChildren.push(new Paragraph({
                    children: [
                        new TextRun({
                            text: textContent,
                            font: fontFamily,
                            size: fontSize,
                            bold: isBold || cleanLine.startsWith('#') || cleanLine.startsWith('[')
                        })
                    ],
                    alignment: alignObj,
                    spacing: { after: 200, line: 360 } // 1.5 line spacing
                }));
            });
            
            // Separator between batches
            docChildren.push(new Paragraph({ text: "", spacing: { after: 400 } }));
        });

        const doc = new Document({
            sections: [{
                properties: { page: { margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } }, // 1 inch margins (Safe for Word)
                children: docChildren
            }]
        });

        try {
            const blob = await Packer.toBlob(doc);
            saveAs(blob, `${subject.replace(/[^a-z0-9]/gi, '_')}.docx`);
        } catch (err) {
            console.error(err);
            alert("Error: Word file download fail ho gaya. Console check karein.");
        }
    }
</script>
</body>
</html>
